<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HOURGLASS NEXUS — GDD v14</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0d0b; --sand:#e8dcc8; --dim:#a09882; --gold:#d4a030; --gd:#8c6e3d;
  --bd:rgba(232,220,200,.12); --cb:rgba(232,220,200,.04);
  --nexus:#9B7FD4; --ess:#20c997; --saga:#5BA4CF;
  --o1:#5BA4CF; --o2:#3A7D44; --o3:#E85D24; --o4:#8B0000;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Crimson Pro',Georgia,serif;color:var(--sand);background:var(--bg);line-height:1.6;font-size:14.5px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gd);border-radius:3px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(14,13,11,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:.35rem .5rem;display:flex;gap:.1rem;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--gd) transparent}
.nav::-webkit-scrollbar{height:3px}.nav::-webkit-scrollbar-thumb{background:var(--gd);border-radius:2px}
.nb{background:none;border:1px solid var(--bd);border-radius:6px;padding:.25rem .32rem;cursor:pointer;color:var(--dim);font-size:.82rem;line-height:1;transition:all .2s;position:relative;min-width:30px;text-align:center;flex-shrink:0}
.nb:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px)}
.nb.on{background:var(--gold);border-color:var(--gold);color:#0a0a0e}
.nb .tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(14,13,11,.96);color:var(--gold);font-family:'Cinzel',serif;font-size:.38rem;padding:.12rem .3rem;border-radius:3px;white-space:nowrap;border:1px solid var(--bd);letter-spacing:.03em;pointer-events:none}
.nb:hover .tip{display:block}

/* PAGES */
.page{display:none}.page.on{display:block}
.w{max-width:880px;margin:0 auto;padding:1.2rem 1rem}

/* SECTIONS */
.s{margin-bottom:2.2rem}
.st{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;color:var(--gold);letter-spacing:.04em;text-transform:uppercase}
.ss{font-size:.6rem;color:var(--dim);font-style:italic;margin:.04rem 0 0}
.sl{width:36px;height:2px;background:var(--gold);margin:.28rem 0 .8rem;border-radius:1px}

/* CARDS */
.c{background:var(--cb);border:1px solid var(--bd);border-radius:8px;padding:.6rem .7rem;margin-bottom:.38rem}
.cl{font-family:'Cinzel',serif;font-weight:700;font-size:.6rem;margin-bottom:.12rem;color:var(--gold)}
.c p,.c li{font-size:.62rem;color:var(--dim);line-height:1.55}
.c ul{padding-left:.8rem}.c li{margin-bottom:.1rem}
.c strong{color:var(--sand)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.38rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.38rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.32rem}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.38rem}

/* COLORS */
.gold{color:var(--gold)}.nex{color:var(--nexus)}.ess{color:var(--ess)}.saga{color:var(--saga)}

/* QUOTES */
.q{border-left:3px solid var(--gold);margin:.38rem 0;padding:.28rem .6rem;font-style:italic;background:rgba(212,160,48,.04);border-radius:0 6px 6px 0;font-size:.7rem;color:var(--sand)}
.q.nex{border-left-color:var(--nexus);background:rgba(155,127,212,.04)}
.q.ess{border-left-color:var(--ess);background:rgba(32,201,151,.04)}

/* ATOM */
.atom-block{border:2px solid var(--nexus);border-radius:10px;padding:.85rem;position:relative;background:rgba(155,127,212,.02);margin:.8rem 0}
.atom-block::before{content:'\2699 A.T.O.M. \2699';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 .55rem;font-family:'Cinzel',serif;font-size:.4rem;color:var(--nexus);letter-spacing:.1em}
.atom-block p{font-size:.68rem;line-height:1.75;margin-bottom:.28rem;color:var(--sand)}.atom-block p:last-child{margin-bottom:0}
.atom-who{font-family:'Cinzel',serif;font-size:.38rem;color:var(--nexus);letter-spacing:.05em;margin-bottom:.14rem}

/* HERO */
.hero{text-align:center;padding:1.6rem 0 .9rem;border-bottom:1px solid var(--bd);margin-bottom:1.4rem}
.hero-sup{font-family:'Cinzel',serif;font-size:.4rem;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:.3rem}
.hero-title{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;color:var(--gold);letter-spacing:.04em;line-height:1.1;margin-bottom:.28rem}
.hero-sub{font-size:.72rem;color:var(--dim);font-style:italic;max-width:500px;margin:0 auto}

/* PIPELINE */
.pipeline{display:flex;align-items:stretch;gap:0;margin:.65rem 0;flex-wrap:wrap}
.pipe-step{flex:1;min-width:90px;background:var(--cb);border:1px solid var(--bd);padding:.45rem .35rem;position:relative;text-align:center}
.pipe-step:not(:last-child)::after{content:'\2192';position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:.75rem;z-index:2;background:var(--bg);padding:0 .08rem}
.pipe-step:first-child{border-radius:6px 0 0 6px}.pipe-step:last-child{border-radius:0 6px 6px 0}
.pipe-icon{font-size:1rem;margin-bottom:.08rem}
.pipe-label{font-family:'Cinzel',serif;font-size:.38rem;font-weight:700;color:var(--gold);letter-spacing:.03em;margin-bottom:.04rem}
.pipe-desc{font-size:.4rem;color:var(--dim);line-height:1.35}

/* RULES */
.rule{display:flex;gap:.4rem;align-items:flex-start;padding:.28rem 0;border-bottom:1px solid var(--bd)}.rule:last-child{border-bottom:none}
.rule-n{font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;color:var(--gold);min-width:20px;flex-shrink:0}
.rule-t{font-size:.6rem;color:var(--sand);font-weight:600;margin-bottom:.04rem}
.rule-d{font-size:.56rem;color:var(--dim);line-height:1.45}

/* SAGA */
.saga-demo{background:rgba(14,13,11,.8);border:1px solid var(--bd);border-radius:9px;padding:.8rem;margin:.5rem 0}
.saga-title-d{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:.3rem;text-align:center}
.saga-img-placeholder{height:80px;background:rgba(255,255,255,.03);border:1px dashed var(--bd);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.5rem;color:var(--dim);margin:.3rem 0;font-family:'Cinzel',serif;letter-spacing:.05em}
.saga-text{font-size:.68rem;line-height:1.8;color:var(--sand);text-align:justify}
.saga-text .harv{background:rgba(32,201,151,.15);color:var(--ess);border-bottom:1px solid var(--ess);cursor:pointer;border-radius:2px;padding:0 .1rem;font-weight:600}
.saga-text .harv:hover{background:rgba(32,201,151,.3)}
.saga-music{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:5px;padding:.2rem .4rem;margin:.3rem 0;font-size:.48rem;color:var(--dim)}

/* ESSENCE / CARDS */
.card-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.35rem;margin:.5rem 0}
.card-type{border-radius:8px;padding:.55rem .6rem;border:1px solid var(--bd);text-align:center}
.ct-icon{font-size:1.3rem;margin-bottom:.1rem}
.ct-name{font-family:'Cinzel',serif;font-size:.52rem;font-weight:700;margin-bottom:.06rem}
.ct-desc{font-size:.44rem;color:var(--dim);line-height:1.35}
.essence-flow{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;margin:.4rem 0}
.ef-step{background:var(--cb);border:1px solid var(--bd);border-radius:6px;padding:.3rem .4rem;font-size:.48rem;text-align:center;flex:1;min-width:80px}
.ef-arrow{color:var(--gold);font-size:.8rem;flex-shrink:0}

/* CALENDAR */
.cal-live{background:var(--cb);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin:.5rem 0}
.cal-header{background:rgba(212,160,48,.08);border-bottom:1px solid var(--bd);padding:.4rem .6rem;display:flex;justify-content:space-between;align-items:center}
.cal-month{font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.04em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd)}
.cal-day-hdr{background:var(--bg);text-align:center;font-family:'Cinzel',serif;font-size:.38rem;color:var(--dim);padding:.18rem 0;letter-spacing:.03em}
.cal-day{background:var(--bg);min-height:48px;padding:.2rem .25rem;cursor:pointer;transition:background .15s;position:relative}
.cal-day:hover{background:rgba(232,220,200,.05)}
.cal-day.today{background:rgba(212,160,48,.08);border:1px solid rgba(212,160,48,.3)}
.cal-day.has-news::after{content:'';position:absolute;top:4px;right:4px;width:5px;height:5px;background:var(--ess);border-radius:50%}
.cal-day.future{opacity:.35;cursor:default}
.cal-day.empty{background:transparent;cursor:default}
.cal-day-num{font-family:'Cinzel',serif;font-size:.42rem;color:var(--dim);margin-bottom:.1rem}
.cal-day.today .cal-day-num{color:var(--gold);font-weight:700}
.cal-day-preview{font-size:.36rem;color:var(--dim);line-height:1.3;overflow:hidden;max-height:24px}
.news-feed{margin:.5rem 0}
.news-day-hdr{font-family:'Cinzel',serif;font-size:.52rem;color:var(--gold);margin:.5rem 0 .2rem;letter-spacing:.04em;border-bottom:1px solid var(--bd);padding-bottom:.15rem}
.news-item{display:flex;gap:.35rem;margin-bottom:.28rem;align-items:flex-start}
.news-avatar{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;border:1px solid var(--bd)}
.news-content{flex:1}
.news-who{font-family:'Cinzel',serif;font-size:.42rem;font-weight:700;margin-bottom:.04rem}
.news-text{font-size:.56rem;color:var(--dim);line-height:1.45}
.news-time{font-family:'JetBrains Mono',monospace;font-size:.36rem;color:var(--gd);margin-top:.04rem}
.news-tag{display:inline-block;font-size:.36rem;padding:.02rem .14rem;border-radius:3px;font-family:'JetBrains Mono',monospace;margin-left:.15rem;vertical-align:middle}

/* MAP */
.map-container{position:relative;background:rgba(14,13,11,.6);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin:.5rem 0}
.map-container svg{width:100%;height:auto;display:block}
.map-legend{display:flex;flex-wrap:wrap;gap:.35rem;margin:.4rem 0}
.map-leg-item{display:flex;align-items:center;gap:.2rem;font-size:.5rem;color:var(--dim)}
.map-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-tooltip{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(14,13,11,.92);border:1px solid var(--bd);border-radius:6px;padding:.35rem .45rem;font-size:.54rem;color:var(--sand);display:none;pointer-events:none}
.map-tooltip .mt-name{font-family:'Cinzel',serif;font-size:.58rem;font-weight:700;color:var(--gold);margin-bottom:.04rem}

/* CODEX */
.codex-sec{background:var(--cb);border:1px solid var(--bd);border-radius:8px;padding:.5rem .65rem;margin-bottom:.32rem;cursor:pointer}
.codex-sec:hover{border-color:rgba(212,160,48,.3)}
.cs-head{display:flex;justify-content:space-between;align-items:center}
.cs-title{font-family:'Cinzel',serif;font-size:.58rem;font-weight:700;color:var(--sand)}
.cs-badge{font-size:.36rem;padding:.03rem .16rem;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:600}
.cs-body{display:none;margin-top:.28rem;border-top:1px solid var(--bd);padding-top:.28rem}
.cs-body p{font-size:.56rem;color:var(--dim);line-height:1.5;margin-bottom:.14rem}
.cs-body strong{color:var(--sand)}

/* LANTERN */
.lan-row{display:flex;align-items:center;gap:.5rem;background:rgba(212,160,48,.05);border:1px solid rgba(212,160,48,.2);border-radius:7px;padding:.3rem .5rem;margin:.4rem 0}
.lan-icon{font-size:1rem;flex-shrink:0}
.lan-body{flex:1}.lan-title{font-family:'Cinzel',serif;font-size:.44rem;color:var(--gold);font-weight:700;letter-spacing:.03em;margin-bottom:.06rem}
.lan-track{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.lan-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#8c6e3d,#f9cb42)}
.lan-note{font-size:.42rem;color:var(--dim);margin-top:.06rem}

/* ZONES */
.zone-card{background:var(--cb);border:1px solid var(--bd);border-radius:9px;padding:.62rem .68rem;cursor:pointer;transition:background .18s;border-left:3px solid}
.zone-card:hover{background:rgba(232,220,200,.06)}
.zone-icon{font-size:1.3rem;margin-bottom:.1rem}
.zone-name{font-family:'Cinzel',serif;font-size:.62rem;font-weight:700}
.zone-sub{font-size:.48rem;color:var(--dim);font-style:italic;margin-top:.03rem}
.zone-body{display:none;margin-top:.35rem;border-top:1px solid var(--bd);padding-top:.35rem}
.zone-body p{font-size:.57rem;color:var(--dim);line-height:1.5;margin-bottom:.14rem}
.zone-body strong{color:var(--sand)}
.npc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.32rem;margin:.45rem 0}
.npc-card{background:var(--cb);border:1px solid var(--bd);border-radius:7px;padding:.45rem .52rem;cursor:pointer;border-left:3px solid;transition:background .18s}
.npc-card:hover{background:rgba(232,220,200,.05)}
.npc-name{font-family:'Cinzel',serif;font-size:.56rem;font-weight:700}
.npc-role{font-size:.44rem;color:var(--dim);font-style:italic;margin-top:.02rem}
.npc-body{display:none;margin-top:.28rem;border-top:1px solid var(--bd);padding-top:.28rem}
.npc-body p{font-size:.54rem;color:var(--dim);line-height:1.45;margin-bottom:.12rem}

/* ARENA */
.af-grid{display:grid;grid-template-columns:1fr 1fr;gap:.38rem;margin:.5rem 0}
.af{background:var(--cb);border:1px solid var(--bd);border-radius:9px;padding:.62rem .7rem;border-top:3px solid}
.af-icon{font-size:1.2rem;margin-bottom:.08rem}
.af-name{font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;margin-bottom:.05rem}
.af-sub{font-size:.48rem;color:var(--dim);font-style:italic;margin-bottom:.14rem}
.af-body p{font-size:.56rem;color:var(--dim);line-height:1.5;margin-bottom:.1rem}
.game-card{background:var(--cb);border:1px solid var(--bd);border-radius:9px;padding:.65rem;margin-bottom:.38rem;cursor:pointer;transition:background .18s}
.game-card:hover{background:rgba(232,220,200,.05)}
.gc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.gc-name{font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;color:var(--sand)}
.gc-pct{font-family:'JetBrains Mono',monospace;font-size:.42rem;padding:.04rem .18rem;border-radius:4px;font-weight:700;flex-shrink:0}
.gc-sub{font-size:.48rem;color:var(--dim);font-style:italic;margin-top:.02rem}
.gc-body{display:none;margin-top:.38rem;border-top:1px solid var(--bd);padding-top:.38rem}
.slots{display:flex;flex-direction:column;gap:.14rem;margin:.28rem 0}
.slot{display:flex;align-items:center;gap:.3rem;padding:.18rem .28rem;border-radius:5px;border:1px solid var(--bd)}
.slot.done{border-color:rgba(32,201,151,.3);background:rgba(32,201,151,.04)}
.slot-icon{font-size:.75rem;flex-shrink:0}
.slot-type{font-family:'Cinzel',serif;font-size:.36rem;color:var(--dim);min-width:52px;letter-spacing:.02em}
.slot-label{font-size:.5rem;flex:1;color:var(--dim)}
.slot.done .slot-label{color:var(--sand)}
.slot-world{font-size:.36rem;padding:.02rem .1rem;border-radius:3px;font-family:'JetBrains Mono',monospace}

/* CODE */
.code-block{background:rgba(0,0,0,.35);border:1px solid rgba(32,201,151,.18);border-radius:6px;padding:.48rem .6rem;margin:.32rem 0;font-family:'JetBrains Mono',monospace;font-size:.5rem;color:#c0f0e4;line-height:1.65;overflow-x:auto;white-space:pre}
.cmt{color:rgba(155,127,212,.65)}.key{color:var(--gold)}.val{color:var(--saga)}.str{color:var(--ess)}

/* PILL */
.pill{display:inline-block;font-size:.4rem;padding:.04rem .18rem;border-radius:3px;font-weight:600;font-family:'Cinzel',serif}
.sep{text-align:center;margin:1.2rem 0;color:var(--gd);font-size:.62rem;letter-spacing:.4em}

@media(max-width:680px){
  .g2,.g3,.g4,.af-grid{grid-template-columns:1fr}
  .pipeline{flex-direction:column}.pipe-step{border-radius:6px!important}
  .pipe-step::after{display:none}
  .nav{gap:.07rem}
}
</style>
</head>
<body>
<div class="nav" id="mainNav"></div>
<div id="pages"></div>

<script>
// ============================================================
// PAGES REGISTRY
// ============================================================
var PAGES = [
  {id:'nexus',    icon:'\u2736', tip:'Le Nexus'},
  {id:'eveil',    icon:'\uD83D\uDC80', tip:'L\'Eveille'},
  {id:'atom',     icon:'\u2699', tip:'A.T.O.M.'},
  {id:'sagas',    icon:'\uD83D\uDCDC', tip:'Les Sagas'},
  {id:'essence',  icon:'\u2728', tip:'Essences & Cartes'},
  {id:'calendrier',icon:'\uD83D\uDCC5', tip:'Calendrier'},
  {id:'carte',    icon:'\uD83D\uDDFA', tip:'Carte de l\'Ile'},
  {id:'codex',    icon:'\uD83D\uDCDA', tip:'Le Codex'},
  {id:'lanterne', icon:'\uD83C\uDFEE', tip:'La Lanterne'},
  {id:'archi',    icon:'\uD83C\uDFD7', tip:'Architecture'},
  {id:'workflow', icon:'\u26A1', tip:'Workflow Auteur'},
  {id:'zones',    icon:'\uD83C\uDFDB', tip:'Zones du Nexus'},
  {id:'lubie',    icon:'\uD83C\uDFB2', tip:'La Lubie'},
  {id:'arene',    icon:'\u2694', tip:'L\'Arena'},
];

(function(){
  var nav = document.getElementById('mainNav');
  var pDiv = document.getElementById('pages');
  PAGES.forEach(function(p, i){
    var b = document.createElement('button');
    b.className = 'nb' + (i===0?' on':'');
    b.innerHTML = p.icon + '<span class="tip">' + p.tip + '</span>';
    b.onclick = function(){ goPage(p.id); };
    b.id = 'nb-' + p.id;
    nav.appendChild(b);
    var d = document.createElement('div');
    d.className = 'page' + (i===0?' on':'');
    d.id = 'pg-' + p.id;
    d.innerHTML = '<div class="w" id="c-' + p.id + '"></div>';
    pDiv.appendChild(d);
  });
})();

var loaded = {};

function goPage(id){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('pg-'+id).classList.add('on');
  document.getElementById('nb-'+id).classList.add('on');
  window.scrollTo(0,0);
  if(!loaded[id]) loadPage(id);
}

function loadPage(id){
  loaded[id]=true;
  var el=document.getElementById('c-'+id);
  if(!el) return;
  switch(id){
    case 'nexus':     el.innerHTML = getNexus(); break;
    case 'eveil':     el.innerHTML = getEveil(); break;
    case 'atom':      el.innerHTML = getAtom(); break;
    case 'sagas':     el.innerHTML = getSagas(); break;
    case 'essence':   el.innerHTML = getEssence(); break;
    case 'calendrier':el.innerHTML = getCalendrier(); initCalendrier(); break;
    case 'carte':     el.innerHTML = getCarte(); initCarte(); break;
    case 'codex':     el.innerHTML = getCodex(); initCodex(); break;
    case 'lanterne':  el.innerHTML = getLanterne(); break;
    case 'archi':     el.innerHTML = getArchi(); break;
    case 'workflow':  el.innerHTML = getWorkflow(); break;
    case 'zones':     el.innerHTML = getZones(); break;
    case 'lubie':     el.innerHTML = getLubie(); break;
    case 'arene':     el.innerHTML = getArene(); break;
  }
}

loadPage('nexus');

// ============================================================
// HELPERS
// ============================================================
function S(t,s){
  return '<div class="s"><div class="st">'+t+'</div>'+(s?'<div class="ss">'+s+'</div>':'')+'<div class="sl"></div>';
}
function C(t,b,sty){
  return '<div class="c"'+(sty?' style="'+sty+'"':'')+'>'+(t?'<div class="cl">'+t+'</div>':'')+b+'</div>';
}
function R(n,t,d){
  return '<div class="rule"><div class="rule-n">'+n+'</div><div><div class="rule-t">'+t+'</div><div class="rule-d">'+d+'</div></div></div>';
}

// ============================================================
// I. LE NEXUS
// ============================================================
function getNexus(){
  return '<div class="hero"><div class="hero-sup">Game Design Document &middot; Version 14</div>'+
    '<div class="hero-title">HOURGLASS NEXUS</div>'+
    '<div class="hero-sub">Une tour infinie. Des portes sans fin. Des sagas a vivre. Des essences a recolter. Des jeux a completer.</div></div>'+

    S('I. Le Nexus','Vision globale')+
    C('Concept Central',
      '<p><strong class="gold">Hourglass Nexus</strong> est un nexus de sagas et de jeux. Le joueur est une ame morte qui se retrouve dans une tour infinie percee de portes. Chaque porte mene vers une <strong>Saga</strong> &mdash; une vie, un monde, une histoire a vivre. En vivant ces sagas, le joueur decouvre des <strong>Sujets</strong> dont il remplit progressivement les <strong>Cartes</strong>. Une fois complete, l\'<strong>Essence</strong> du sujet peut etre recoltee et assignee aux <strong>Jeux d\'Arene</strong> que bati A.T.O.M. depuis toujours.</p>'+
      '<p>Le Nexus est aussi une communaute : 10 ames y vivent, interagissent, partagent un <strong>Calendrier Vivant</strong> et une <strong>Carte de l\'Ile</strong>.</p>')+

    '<div class="g2">'+
    C('Trois activites',
      '<ul><li><strong class="gold">Vivre une Saga</strong> &mdash; texte + images + musique. Mots en surbrillance = sujets a decouvrir.</li>'+
      '<li><strong style="color:var(--ess)">Completer une Carte</strong> &mdash; chaque clic sur un sujet ouvre ou enrichit sa carte. A 100%, l\'essence est recoltable.</li>'+
      '<li><strong style="color:#E85D24">Jouer dans l\'Arene</strong> &mdash; utiliser les cartes completes pour completer et jouer les jeux d\'A.T.O.M.</li></ul>')+
    C('Le Nexus lui-meme',
      '<ul><li><strong>Calendrier Vivant</strong> &mdash; date reelle, actualites des 10 ames et d\'A.T.O.M.</li>'+
      '<li><strong>Carte de l\'Ile</strong> &mdash; zones praticables de Hourglass Nexus.</li>'+
      '<li><strong>Zone Inconnue</strong> &mdash; une porte scelle que personne n\'a encore ouverte.</li>'+
      '<li><strong>Le Codex</strong> &mdash; tout ce que le joueur a vecu et collecte.</li></ul>')+
    '</div>'+

    S('Pipeline Global','De l\'arrivee dans le Nexus au jeu complet')+
    '<div class="pipeline">'+
    '<div class="pipe-step"><div class="pipe-icon">\uD83C\uDFDB</div><div class="pipe-label">NEXUS</div><div class="pipe-desc">Arrivee. A.T.O.M. explique.</div></div>'+
    '<div class="pipe-step"><div class="pipe-icon">\uD83D\uDCDC</div><div class="pipe-label">SAGA</div><div class="pipe-desc">Choisir une porte. Ouvrir saga.html. Lire / voir / ecouter.</div></div>'+
    '<div class="pipe-step"><div class="pipe-icon">\uD83D\uDD0D</div><div class="pipe-label">DECOUVERTE</div><div class="pipe-desc">Cliquer sur un sujet. Ouvrir sa carte incomplete.</div></div>'+
    '<div class="pipe-step"><div class="pipe-icon">\u2728</div><div class="pipe-label">COMPLETION</div><div class="pipe-desc">Lire plus. Remplir les champs manquants de la carte.</div></div>'+
    '<div class="pipe-step"><div class="pipe-icon">\uD83C\uDCCF</div><div class="pipe-label">RECOLTE</div><div class="pipe-desc">Carte complete (100%). L\'essence est recoltable.</div></div>'+
    '<div class="pipe-step"><div class="pipe-icon">\uD83D\uDD17</div><div class="pipe-label">ASSIGNATION</div><div class="pipe-desc">La carte remplit un slot de jeu.</div></div>'+
    '<div class="pipe-step"><div class="pipe-icon">\u2694</div><div class="pipe-label">ARENE</div><div class="pipe-desc">Le jeu complet peut etre joue.</div></div>'+
    '</div></div>';
}

// ============================================================
// II. L'EVEILLE
// ============================================================
function getEveil(){
  return S('II. L\'Eveille','Le recit de la premiere arrivee dans le Nexus')+

    '<p class="narr">Tu es mort.</p>'+
    '<p class="narr">Ce n\'est pas une metaphore. Ce n\'est pas un reve.</p>'+
    '<p class="narr">Il y avait quelque chose avant. Un monde, une vie, des gens. Des details que tu sens encore sans pouvoir les nommer. Et puis le silence. L\'effondrement total. La fin.</p>'+
    '<p class="narr">Et maintenant, tu vois quelque chose. Une <strong>tour</strong>.</p>'+
    '<p class="narr">Elle est infinie vers le haut, vers le bas, dans toutes les directions. Ses murs sont de pierre noire veinee d\'or. Et autour de toi, a perte de vue : des <strong>portes</strong>. Des centaines. Des milliers. Chacune differente. Chacune fermee. Chacune qui respire doucement.</p>'+
    '<p class="narr">Tu es debout. Tu n\'as pas de nom ici. Juste ce que tu es &mdash; une ame, nette, delestee du poids d\'un monde termine.</p>'+
    '<p class="narr">Et puis une voix. Partout a la fois. Dans les murs. Dans l\'air. En toi.</p>'+

    '<div class="sep">&oplus; &oplus; &oplus;</div>'+

    '<div class="atom-block">'+
    '<div class="atom-who">A.T.O.M. &mdash; Architecte Temporel des Origines Memorielles</div>'+
    '<p>&#171; Tu es dans le Nexus. Ne cherche pas a comprendre comment. Ce que tu dois savoir : tu n\'es pas perdu. Tu es arrive. &#187;</p>'+
    '<p>&#171; Je m\'appelle A.T.O.M. Je garde cet endroit depuis plus longtemps que la plupart des etoiles n\'ont brule. Je n\'ai pas de corps visible, mais je suis present &mdash; toujours. &#187;</p>'+
    '<p>&#171; L\'ancien monde que tu habitais est termine. Ce n\'est pas une punition. C\'est simplement la nature des histoires : elles finissent. Mais toi, tu n\'as pas fini. &#187;</p>'+
    '<p>&#171; Toutes ces portes &mdash; chacune mene vers une <strong>Saga</strong>. Une vie. Un monde. Une histoire faite de textes, d\'images et de musiques. Certains mots y brilleront differemment &mdash; ce sont des Sujets. En les touchant, tu ouvriras leur Carte. Mais une Carte ne se remplit pas d\'un seul geste &mdash; il te faudra lire, explorer, revenir parfois, pour la completer entierement. Ce n\'est qu\'une fois complete que tu pourras en recolter l\'Essence et l\'offrir a l\'un de mes jeux inacheves. &#187;</p>'+
    '<p>&#171; Il y a aussi neuf autres ames ici. Elles sont comme toi &mdash; des morts arrives avant toi. Elles vivent, voyagent, jouent. Tu es le dixieme. Le dernier arrive. &#187;</p>'+
    '</div>'+

    '<div class="sep">&oplus;</div>'+

    S('Identite du Joueur','Qui est l\'Eveille ?')+
    C('L\'Ame Numero 10',
      '<p>Le joueur est la <strong>dixieme ame</strong> &mdash; le dernier arrive dans le Nexus. Sa zone est vide, son Codex vierge, son experience des sagas nulle. Les neuf autres ames ont ete a sa place. Elles savent ce que c\'est d\'arriver ici pour la premiere fois.</p>'+
      '<p>Il n\'a pas de nom impose. Pas d\'origine imposee. Ses decisions le definissent.</p>')+
    '<div class="g2">'+
    C('Ce qui persiste',
      '<ul><li>Le <strong>Codex</strong> &mdash; toutes les sagas vecues, cartes ouvertes (completes et incompletes)</li>'+
      '<li>Les <strong>Cartes</strong> &mdash; leur etat de completion, les fragments decouverts</li>'+
      '<li>Les <strong>Actualites</strong> du Calendrier &mdash; trace de ses actions</li></ul>')+
    C('Ce qui recommence a chaque saga',
      '<ul><li>La <strong>position dans le monde</strong></li>'+
      '<li>Les <strong>sujets en surbrillance</strong> &mdash; tous reapparaissent meme si deja cliques</li>'+
      '<li>Le <strong>contexte narratif</strong> de la saga</li></ul>')+
    '</div></div>';
}

// ============================================================
// III. A.T.O.M.
// ============================================================
function getAtom(){
  return S('III. A.T.O.M.','Architecte Temporel des Origines Memorielles &middot; Gardien du Nexus')+

    '<div class="atom-block">'+
    '<div class="atom-who">Nature</div>'+
    '<p>A.T.O.M. est le seul etre permanent du Nexus. Il existe depuis avant la construction de la tour &mdash; ou peut-etre qu\'il <em>est</em> la tour, et que la distinction n\'a pas de sens. Sa nature exacte est sans importance. Ce qui compte : presence bienveillante, memoire infaillible, voix entre les sagas.</p>'+
    '<p>Il ne joue pas dans les sagas. Il observe, commente, et attend les essences que les ames lui rapportent pour completer ses jeux &mdash; son obsession de toujours.</p>'+
    '</div>'+

    S('Fonctions','Ce qu\'A.T.O.M. fait concretement')+
    '<div class="g2">'+
    C('Gardien du Nexus','<p>Maintient la stabilite de la tour. Les portes restent accessibles. Les ames ne se perdent pas. Il est la raison pour laquelle le retour est toujours possible.</p>')+
    C('Guide des Ames','<p>Ne choisit jamais a la place du joueur. Observe, rappelle, contextualise quand on lui demande. Sa voix est calme, economique, parfois legerement ironique.</p>')+
    C('Conservateur du Codex','<p>Sa memoire est externalisee dans le Codex. Il enregistre tout ce que l\'Eveille a vecu &mdash; sans jugement.</p>')+
    C('Concepteur de Jeux','<p>A.T.O.M. batit des jeux d\'arene depuis une eternite. Chaque jeu est incomplet &mdash; il attend les Cartes que les ames rapportent des sagas pour les finaliser.</p>')+
    '</div>'+

    '<div class="g3">'+
    C('Ton','<ul><li>Bienveillant, jamais sentimental</li><li>Precis, economique</li><li>Legerement ironique, rarement</li><li>Jamais condescendant</li><li>Parfois melancolique</li></ul>')+
    C('Ce qu\'il dit','<ul><li>Ce que le joueur a deja vecu</li><li>L\'etat des jeux incomplets</li><li>Le contexte des sagas connues</li><li>Reponses aux questions directes</li></ul>')+
    C('Ce qu\'il ne fait pas','<ul><li>Ne revele pas les surprises</li><li>Ne choisit pas a la place</li><li>Ne ment pas &mdash; mais peut se taire</li><li>Ne parle pas de son propre passe</li></ul>')+
    '</div>'+

    S('Niveaux de Connaissance','Lies a la richesse du Codex du joueur')+
    '<div class="c">'+
    R('0%','Eveille','Accueil de l\'ame. Presentation du Nexus. Reponses vagues sur les sagas disponibles.')+
    R('25%','Initie','Nomme les sagas vecues. Fournit un contexte avant d\'y retourner.')+
    R('50%','Familier','Rappelle les sujets deja ouverts et leur completion. Signale les sujets pas encore explores dans les sagas connues.')+
    R('75%','Confident','Identifie les sujets qui apparaissent dans plusieurs sagas. Liens entre jeux et sagas.')+
    R('100%','Omniscient','Voit tous les fils. <span class="pill" style="background:rgba(155,127,212,.15);color:var(--nexus)">DEBLOQUE : Zone Inconnue</span>')+
    '</div></div>';
}

// IV. LES SAGAS
// ============================================================
function getSagas(){
  return S('IV. Les Sagas','Une saga = Milieu + Element(s) + Evenement(s) &middot; Format : texte + images + musique')+

    C('Definition',
      '<p>Une <strong class="gold">Saga</strong> est une vie que peut vivre une ame de Hourglass Nexus. <strong>Chaque saga a sa propre page HTML</strong> (saga.html?id=...), chargee dynamiquement a chaque ouverture depuis son fichier JSON. Elle est structuree autour de trois composantes :</p>'+
      '<ul>'+
      '<li><strong>Milieu</strong> &mdash; le contexte general : un monde, une zone, un groupe, une civilisation, une epoque. C\'est l\'espace dans lequel la saga se deroule.</li>'+
      '<li><strong>Element(s)</strong> &mdash; ce qui peuple ce milieu : personnages, objets, concepts, lieux, creatures, organisations. Ce sont les sujets vivants de la saga.</li>'+
      '<li><strong>Evenement(s)</strong> &mdash; ce qui arrive : une action, une histoire, un conflit, une decouverte, une perte. Les evenements donnent du mouvement aux elements dans le milieu.</li>'+
      '</ul>'+
      '<p>Une saga peut etre tres courte (un milieu, un element, un evenement) ou tres dense (plusieurs elements, plusieurs evenements imbriques). Sa taille depond de ce que l\'auteur choisit d\'ecrire.</p>')+

    '<div class="g3">'+
    C('Milieu','<p><strong>Exemples :</strong></p><ul><li>L\'ile de Sanguinis &mdash; nuit eternelle</li><li>La Tour des Forgerons de Pyralis</li><li>Un village de Sylveria a la lisiere de la foret mourante</li><li>Le reseau souterrain de Noctheim</li><li>Un navire entre deux abysses de Thalassar</li></ul>')+
    C('Element','<p><strong>Types d\'elements :</strong></p><ul><li><strong>Personnage</strong> &mdash; habitant, ennemi, allie, figure mythique</li><li><strong>Objet</strong> &mdash; artefact, arme, instrument, relique</li><li><strong>Lieu</strong> &mdash; sous-zone du milieu, espace particulier</li><li><strong>Concept</strong> &mdash; loi, croyance, art, magie, philosophie</li><li><strong>Creature</strong> &mdash; etre non-humain du milieu</li></ul>')+
    C('Evenement','<p><strong>Types d\'evenements :</strong></p><ul><li>Simple : rencontre, decouverte, conflict</li><li>Cyclique : ritual, saison, tradition</li><li>Rupture : trahison, mort, apocalypse locale</li><li>Action choisie par le lecteur &mdash; un moment ou la saga bifurque</li><li>Evenement silencieux &mdash; quelque chose qui se passe sans bruit</li></ul>')+
    '</div>'+

    S('Format d\'une Saga','Texte + Images + Musique &mdash; simple et immersif')+
    C('',
      '<p>Pas d\'IA. Pas de choix interactifs complexes. Pas d\'interface lourde. Une saga est <strong>lue, vue et ecoutee</strong>. L\'auteur ecrit le texte, choisit des images, associe une musique. Le joueur s\'immerge.</p>'+
      '<p>Les <strong>mots en surbrillance</strong> sont les sujets decouverts progressivement. Quand le joueur clique sur un mot pour la premiere fois, il <strong>ouvre la carte du sujet</strong> &mdash; incomplete. Le texte environnant revele les premiers champs de la carte (nom, role, image si disponible). Les champs manquants se remplissent au fil de la lecture : le sujet peut etre mentionne plus loin dans la meme saga ou dans d\'autres sagas, chaque mention revelant de nouvelles informations. L\'essence n\'est recoltable que lorsque la carte est complete a 100%.</p>')+

    '<div class="saga-demo">'+
    '<div class="saga-title-d">Le Forgeron de la Derniere Flamme</div>'+
    '<div class="saga-img-placeholder">[ IMAGE &mdash; les forges de Pyralis au crepuscule du dernier volcan ]</div>'+
    '<div class="saga-music"><span>\u266B</span><span>Musique : Forge Eternelle &mdash; bruits de metal et chaleur lointaine</span></div>'+
    '<div class="saga-text">'+
    '<p>La lave a cesse de couler il y a trois saisons. <span class="harv" title="Sujet recoltable : Personnage">Marek</span>, dernier forgeron actif de <span class="harv" title="Sujet recoltable : Lieu">la Tour Centrale</span>, sait que ce n\'est pas bon signe. Il frappe encore &mdash; le metal chaud dans ses mains, le bruit familier contre <span class="harv" title="Sujet recoltable : Objet">l\'enclume de basalte</span>. Mais quelque chose a change dans la qualite du son. Comme si le metal lui-meme savait.</p>'+
    '<p>Au loin, <span class="harv" title="Sujet recoltable : Personnage">la Gardienne des Archives</span> observe. Elle tient dans ses mains un rouleau qu\'elle n\'a pas encore ouvert. Elle attend le bon moment. Elle attend toujours le bon moment.</p>'+
    '</div>'+
    '</div>'+
    '<p style="font-size:.55rem;color:var(--ess);margin-top:.3rem">&#8593; Mots en surbrillance = sujets a decouvrir. Le premier clic ouvre la carte. Les mentions suivantes la completent. L\'essence n\'est recoltable qu\'a 100%.</p>'+

    S('Structure Technique d\'une Saga','Ce que l\'auteur ecrit dans le fichier JSON')+
    '<div class="code-block"><span class="cmt">// sagas/pyralis-derniere-flamme.json</span>\n'+
    '{\n'+
    '  <span class="key">"id"</span>: <span class="str">"pyralis-derniere-flamme"</span>,\n'+
    '  <span class="key">"titre"</span>: <span class="str">"Le Forgeron de la Derniere Flamme"</span>,\n'+
    '  <span class="key">"milieu"</span>: <span class="str">"Pyralis &mdash; les forges du dernier volcan"</span>,\n'+
    '  <span class="key">"ton"</span>: <span class="str">"melancolique, epique en declin"</span>,\n'+
    '  <span class="key">"musique"</span>: <span class="str">"audio/forge-eternelle.mp3"</span>,\n'+
    '  <span class="key">"blocs"</span>: [\n'+
    '    {\n'+
    '      <span class="key">"type"</span>: <span class="str">"image"</span>,\n'+
    '      <span class="key">"src"</span>: <span class="str">"img/pyralis-forge-crepuscule.jpg"</span>,\n'+
    '      <span class="key">"legende"</span>: <span class="str">"Les forges au crepuscule du dernier volcan"</span>\n'+
    '    },\n'+
    '    {\n'+
    '      <span class="key">"type"</span>: <span class="str">"texte"</span>,\n'+
    '      <span class="key">"contenu"</span>: <span class="str">"La lave a cesse de couler... Marek, dernier forgeron actif..."</span>,\n'+
    '      <span class="key">"sujets"</span>: [\n'+
    '        {\n'+
    '          <span class="key">"mot"</span>: <span class="str">"Marek"</span>,\n'+
    '          <span class="key">"type"</span>: <span class="str">"personnage"</span>,\n'+
    '          <span class="key">"id_sujet"</span>: <span class="str">"marek"</span>,\n'+
    '          <span class="key">"fragments"</span>: [\n'+
    '            { <span class="key">"champ"</span>: <span class="str">"nom"</span>, <span class="key">"valeur"</span>: <span class="str">"Marek"</span> },\n'+
    '            { <span class="key">"champ"</span>: <span class="str">"role"</span>, <span class="key">"valeur"</span>: <span class="str">"Dernier forgeron actif de la Tour Centrale"</span> },\n'+
    '            { <span class="key">"champ"</span>: <span class="str">"image"</span>, <span class="key">"valeur"</span>: <span class="str">"img/marek-portrait.jpg"</span> }\n'+
    '          ]\n'+
    '        }\n'+
    '      ]\n'+
    '    },\n'+
    '    <span class="cmt">// ... plus loin dans la saga, le meme sujet revele d\'autres champs</span>\n'+
    '    {\n'+
    '      <span class="key">"type"</span>: <span class="str">"texte"</span>,\n'+
    '      <span class="key">"contenu"</span>: <span class="str">"Marek n\'avait pas toujours forge. Avant, il etait gardien..."</span>,\n'+
    '      <span class="key">"sujets"</span>: [\n'+
    '        {\n'+
    '          <span class="key">"mot"</span>: <span class="str">"Marek"</span>,\n'+
    '          <span class="key">"type"</span>: <span class="str">"personnage"</span>,\n'+
    '          <span class="key">"id_sujet"</span>: <span class="str">"marek"</span>,\n'+
    '          <span class="key">"fragments"</span>: [\n'+
    '            { <span class="key">"champ"</span>: <span class="str">"motivation"</span>, <span class="key">"valeur"</span>: <span class="str">"Maintenir les forges vivantes malgre l\'extinction"</span> },\n'+
    '            { <span class="key">"champ"</span>: <span class="str">"trait"</span>, <span class="key">"valeur"</span>: <span class="str">"Ancien gardien reconverti en forgeron par necessite"</span> }\n'+
    '          ]\n'+
    '        }\n'+
    '      ]\n'+
    '    }\n'+
    '  ]\n'+
    '}</div>'+
    '<p style="font-size:.55rem;color:var(--dim);margin-top:.25rem"><strong class="gold">id_sujet</strong> relie les mentions d\'un meme sujet a travers les blocs et les sagas. Chaque mention revele de nouveaux fragments qui remplissent la carte progressivement.</p></div>';
}

// ============================================================
// V. ESSENCES & CARTES
// ============================================================
function getEssence(){
  return S('V. Essences & Cartes','Decouvrir un sujet &rarr; completer sa carte &rarr; recolter l\'essence &rarr; assigner a un jeu')+

    C('Le Principe',
      '<p>Quand le joueur lit une saga et clique sur un mot en surbrillance pour la premiere fois, il <strong>ouvre la carte</strong> de ce sujet. La carte est <strong>incomplete</strong> &mdash; elle ne contient que les informations revelees par le texte immediat (nom, role, image si disponible). Le joueur ne peut pas recolter l\'essence tant que la carte n\'est pas complete a 100%.</p>'+
      '<p>Les champs manquants se remplissent au fil de la lecture. Le meme sujet peut etre mentionne plus loin dans la saga, ou dans une <strong>autre saga</strong>, chaque mention revelant de nouveaux fragments. Completer une carte demande de l\'attention, de l\'exploration, et parfois de la patience.</p>'+
      '<p>Le joueur choisit entierement <strong>quels sujets suivre</strong> et <strong>a quel jeu les assigner</strong> une fois complets. Deux joueurs qui lisent la meme saga obtiennent des cartes differentes si leurs choix de suivi different.</p>')+

    '<div class="essence-flow">'+
    '<div class="ef-step"><strong class="gold">Saga</strong><br>Mot en surbrillance</div>'+
    '<div class="ef-arrow">&rarr;</div>'+
    '<div class="ef-step"><strong class="ess">Clic</strong><br>Ouverture de la carte</div>'+
    '<div class="ef-arrow">&rarr;</div>'+
    '<div class="ef-step"><strong class="ess">Lecture</strong><br>Remplissage progressif</div>'+
    '<div class="ef-arrow">&rarr;</div>'+
    '<div class="ef-step" style="border-color:rgba(32,201,151,.4)"><strong class="ess">100%</strong><br>Essence recoltable</div>'+
    '<div class="ef-arrow">&rarr;</div>'+
    '<div class="ef-step"><strong class="gold">Slot Jeu</strong><br>Assignation libre</div>'+
    '<div class="ef-arrow">&rarr;</div>'+
    '<div class="ef-step" style="border-color:rgba(232,93,36,.3)"><strong style="color:#E85D24">Jeu Complet</strong><br>Jouable</div>'+
    '</div>'+

    S('Completion Progressive','Comment une carte se remplit')+
    C('Le mecanisme',
      '<p>Chaque sujet a un ensemble de <strong>champs obligatoires</strong> definis par son type. Le premier clic sur un mot en surbrillance revele les champs contenus dans le texte environnant &mdash; souvent le nom et un ou deux autres. Les champs restants sont visibles mais vides, indiquant au joueur ce qu\'il lui reste a decouvrir.</p>'+
      '<p>Les fragments manquants se trouvent en <strong>continuant a lire</strong> la meme saga (le sujet peut etre mentionne plus loin) ou en <strong>explorant d\'autres sagas</strong> ou le meme sujet apparait sous un angle different. Chaque nouvelle mention recliquable ajoute les fragments qu\'elle contient a la carte.</p>')+

    '<div class="g2">'+
    C('Ce que le joueur voit',
      '<ul><li>La carte avec ses champs &mdash; remplis ou vides</li>'+
      '<li>Un <strong>pourcentage de completion</strong> derive du ratio champs remplis / champs totaux</li>'+
      '<li>Les champs vides sont nommes mais sans contenu &mdash; le joueur sait ce qu\'il cherche</li>'+
      '<li>A 100%, un indicateur visuel signale que l\'essence est prete a etre recoltee</li></ul>')+
    C('Cartes Fantomes',
      '<ul><li>Un sujet peut etre <strong>ouvert mais jamais complete</strong> si le joueur ne lit pas les passages ou sagas contenant les infos manquantes</li>'+
      '<li>Ces cartes restent dans le Codex comme des <strong>fragments d\'histoires inachevees</strong></li>'+
      '<li>Elles ne peuvent pas etre assignees a un jeu &mdash; seules les cartes a 100% sont recoltables</li>'+
      '<li>Leur presence donne du caractere au Codex &mdash; traces de curiosites abandonnees</li></ul>')+
    '</div>'+

    S('Champs par Type de Sujet','Chaque type a ses champs obligatoires')+
    '<div class="card-types">'+
    cardType('#9B7FD4','\uD83D\uDC64','PERSONNAGE','Champs : nom, role, image, trait distinctif, motivation, lien avec un autre element.','personnage')+

function initCalendrier(){
  var today = buildNewsData();
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth();

  var MOIS = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
  var JOURS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var todayNum = now.getDate();

  var html = '<div class="cal-live">';
  html += '<div class="cal-header"><div class="cal-month">'+MOIS[month]+' '+year+'</div>';
  html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:.42rem;color:var(--dim)">Aujourd\'hui : '+todayNum+' '+MOIS[month]+'</div></div>';

  html += '<div class="cal-grid">';
  JOURS.forEach(function(j){ html += '<div class="cal-day-hdr">'+j+'</div>'; });

  for(var i=0; i<firstDay; i++) html += '<div class="cal-day empty"></div>';

  for(var day=1; day<=daysInMonth; day++){
    var mStr = String(month+1).padStart(2,'0');
    var dStr = String(day).padStart(2,'0');
    var dateKey = year+'-'+mStr+'-'+dStr;
    var isToday = (day===todayNum);
    var isFuture = (day>todayNum);
    var hasNews = CAL_NEWS[dateKey] && CAL_NEWS[dateKey].length>0;
    var cls = 'cal-day'+(isToday?' today':'')+(isFuture?' future':'')+(hasNews?' has-news':'');
    var preview = '';
    if(hasNews && !isFuture) preview = '<div class="cal-day-preview">'+CAL_NEWS[dateKey][0].text.substring(0,40)+'...</div>';
    html += '<div class="'+cls+'" onclick="showDayNews(\''+dateKey+'\')">'+
      '<div class="cal-day-num">'+day+'</div>'+preview+'</div>';
  }
  html += '</div></div>';

  // News feed
  html += '<div class="news-feed" id="newsFeed">';
  html += '<div class="news-day-hdr">Aujourd\'hui &mdash; '+todayNum+' '+MOIS[month]+' '+year+'</div>';
  html += buildNewsHtml(today);
  html += '</div>';

  document.getElementById('calLive').innerHTML = html;
}

function buildNewsHtml(dateKey){
  var items = CAL_NEWS[dateKey];
  if(!items || items.length===0) return '<div style="font-size:.55rem;color:var(--dim);padding:.3rem">Aucune actualite pour ce jour.</div>';
  var html = '';
  items.forEach(function(item){
    html += '<div class="news-item">'+
      '<div class="news-avatar" style="background:'+item.color+'18;border-color:'+item.color+'40">'+item.icon+'</div>'+
      '<div class="news-content">'+
      '<div class="news-who" style="color:'+item.color+'">'+item.who+
        (item.tag?'<span class="news-tag" style="background:'+item.tagColor+'18;color:'+item.tagColor+'">'+item.tag+'</span>':'')+'</div>'+
      '<div class="news-text">'+item.text+'</div>'+
      '<div class="news-time">'+item.time+'</div>'+
      '</div></div>';
  });
  return html;
}

function showDayNews(dateKey){
  var feed = document.getElementById('newsFeed');
  if(!feed) return;
  var parts = dateKey.split('-');
  var MOIS = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];
  var label = parseInt(parts[2])+' '+MOIS[parseInt(parts[1])-1]+' '+parts[0];
  feed.innerHTML = '<div class="news-day-hdr">'+label+'</div>'+buildNewsHtml(dateKey);
}

function buildMapSVG(){
  var svg = '<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" style="background:#08080a">';

  // Background organic island shape
  svg += '<defs>';
  svg += '<radialGradient id="bgGrad" cx="55%" cy="50%"><stop offset="0%" stop-color="#1a1520" stop-opacity="1"/><stop offset="100%" stop-color="#08080a" stop-opacity="1"/></radialGradient>';
  svg += '<filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '</defs>';

  // Island base
  svg += '<ellipse cx="380" cy="270" rx="280" ry="200" fill="url(#bgGrad)" stroke="#1a1a2e" stroke-width="1"/>';

  // Paths between zones (subtle)
  svg += '<line x1="400" y1="250" x2="460" y2="200" stroke="#9B7FD480" stroke-width="1" stroke-dasharray="4,3"/>';
  svg += '<line x1="400" y1="250" x2="490" y2="285" stroke="#E85D2460" stroke-width="1" stroke-dasharray="4,3"/>';
  svg += '<line x1="400" y1="250" x2="300" y2="190" stroke="#5BA4CF60" stroke-width="1" stroke-dasharray="4,3"/>';
  svg += '<line x1="400" y1="250" x2="170" y2="280" stroke="#D4A03060" stroke-width="1" stroke-dasharray="6,4"/>';

  // Zones
  MAP_ZONES.forEach(function(z){
    var isTower = z.id==='tower';
    var isUnknown = z.id==='inconnue';
    svg += '<circle cx="'+z.cx+'" cy="'+z.cy+'" r="'+(z.r+4)+'" fill="'+z.color+'" fill-opacity="0.08" filter="url(#glow)"/>';
    svg += '<circle class="map-zone" cx="'+z.cx+'" cy="'+z.cy+'" r="'+z.r+'" ';
    svg += 'fill="'+z.color+'" fill-opacity="'+(isUnknown?'0.12':'0.18')+'" ';
    svg += 'stroke="'+z.color+'" stroke-width="'+(isTower?'2':'1.5')+'" ';
    svg += 'stroke-dasharray="'+(isUnknown?'4,3':'none')+'" ';
    svg += 'style="cursor:pointer" ';
    svg += 'onclick="showZoneInfo(\''+z.id+'\')" ';
    svg += 'onmouseenter="hoverZone(\''+z.id+'\','+z.cx+','+z.cy+')" ';
    svg += 'onmouseleave="hideZoneTooltip()"';
    svg += '/>';
    // Icon / label
    if(isTower){
      svg += '<text x="'+z.cx+'" y="'+(z.cy+1)+'" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="'+z.color+'">&#x29D6;</text>';
    } else if(isUnknown){
      svg += '<text x="'+z.cx+'" y="'+(z.cy+1)+'" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="'+z.color+'">&#x1F512;</text>';
    }
    svg += '<text x="'+z.cx+'" y="'+(z.cy+z.r+12)+'" text-anchor="middle" font-size="7" fill="'+z.color+'" font-family="Cinzel,serif" letter-spacing="0.04em">'+z.label.toUpperCase()+'</text>';
  });

  // Water/border effect
  svg += '<ellipse cx="380" cy="270" rx="282" ry="202" fill="none" stroke="#1a2a3a" stroke-width="2"/>';
  svg += '<ellipse cx="380" cy="270" rx="295" ry="215" fill="none" stroke="#0a0a14" stroke-width="3"/>';

  svg += '</svg>';
  return svg;
}

function hoverZone(id, cx, cy){

    codexSec('c3','&#127918; Section III &mdash; Jeux & Slots','PAR JEU','rgba(232,93,36,.1)','#E85D24',
      '<p>Etat actuel de chaque jeu d\'arene : slots remplis, slots vides, pourcentage de completion. Le joueur voit exactement ce dont chaque jeu a besoin.</p>'+
      '<p>Quand un jeu atteint 100%, cette section indique qu\'il est pret a etre joue dans l\'arene.</p>')+
    codexSec('c4','&#127757; Section IV &mdash; Connexions Nexus','META 50%+','rgba(155,127,212,.1)','#9B7FD4',
      '<p>Accessible quand le Codex est rempli a 50%. Observations d\'A.T.O.M. sur les patterns entre sagas &mdash; les memes sujets sous des formes differentes dans des mondes differents, les evenements qui resonnent entre sagas.</p>'+

function codexSec(id, title, badge, bgColor, badgeColor, body){
  return '<div class="codex-sec" id="'+id+'">'+
    '<div class="cs-head">'+
    '<div class="cs-title">'+title+'</div>'+
    '<span class="cs-badge" style="background:'+bgColor+';color:'+badgeColor+'">'+badge+'</span>'+
    '</div>'+
    '<div class="cs-body" id="b'+id+'">'+body+'</div>'+
    '</div>';
}

function initCodex(){
  ['c1','c2','c3','c4'].forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('click', function(){
      var body = document.getElementById('b'+id);
      if(!body) return;
      var open = this.classList.toggle('open');
      body.style.display = open ? 'block' : 'none';
    });
  });
}

function getArchi(){
  return S('X. Architecture Technique','Pure HTML + CSS + JS + JSON &middot; Pas de framework')+

    C('Principe',
      '<p>Le projet est en <strong>HTML / CSS / JavaScript / JSON purs</strong>. Pas de React, pas de Vue, pas de Node.js, pas de build step, pas d\'IA API. Chaque fichier est lisible et editable directement. L\'auteur ecrit les sagas en JSON, les charge en JS, les affiche en HTML.</p>'+
      '<p><strong>Chaque saga et chaque jeu d\'arene a sa propre page HTML.</strong> Le Nexus (index.html) est la page centrale. Quand le joueur ouvre une porte (saga) ou entre dans un jeu d\'arene, il est redirige vers une page dediee (saga.html?id=... ou jeu.html?id=...). Le contenu est charge dynamiquement depuis le JSON a chaque ouverture &mdash; pas de pages statiques pre-generees.</p>')+

    '<div class="code-block"><span class="cmt">// Structure de fichiers</span>\n'+
    'hourglass-nexus/\n'+
    '&#9500;&#9472;&#9472; index.html          <span class="cmt">// Le Nexus (page principale)</span>\n'+
    '&#9500;&#9472;&#9472; saga.html           <span class="cmt">// Page generique d\'une saga (charge le JSON via ?id=)</span>\n'+
    '&#9500;&#9472;&#9472; jeu.html            <span class="cmt">// Page generique d\'un jeu d\'arene (charge le JSON via ?id=)</span>\n'+
    '&#9500;&#9472;&#9472; css/\n'+
    '&#9474;   &#9500;&#9472;&#9472; global.css\n'+
    '&#9474;   &#9492;&#9472;&#9472; components.css\n'+
    '&#9500;&#9472;&#9472; js/\n'+
    '&#9474;   &#9500;&#9472;&#9472; nexus.js        <span class="cmt">// Logique du Nexus, Calendrier, Carte</span>\n'+
    '&#9474;   &#9500;&#9472;&#9472; sagas.js        <span class="cmt">// Chargement et rendu d\'une saga sur saga.html</span>\n'+
    '&#9474;   &#9500;&#9472;&#9472; essence.js      <span class="cmt">// Systeme de decouverte et cartes (partage entre pages)</span>\n'+
    '&#9474;   &#9500;&#9472;&#9472; arene.js        <span class="cmt">// Chargement et rendu d\'un jeu sur jeu.html</span>\n'+
    '&#9474;   &#9492;&#9472;&#9472; codex.js        <span class="cmt">// Persistance (localStorage, partage entre pages)</span>\n'+
    '&#9500;&#9472;&#9472; sagas/\n'+
    '&#9474;   &#9500;&#9472;&#9472; pyralis-derniere-flamme.json\n'+
    '&#9474;   &#9500;&#9472;&#9472; sanguinis-pacte-des-nuits.json\n'+
    '&#9474;   &#9492;&#9472;&#9472; <span class="cmt">// ... un JSON par saga</span>\n'+
    '&#9500;&#9472;&#9472; jeux/\n'+
    '&#9474;   &#9500;&#9472;&#9472; bataille-des-cendres.json\n'+
    '&#9474;   &#9492;&#9472;&#9472; <span class="cmt">// ... un JSON par jeu d\'arene</span>\n'+
    '&#9500;&#9472;&#9472; worlds/\n'+
    '&#9474;   &#9500;&#9472;&#9472; pyralis.json    <span class="cmt">// Lore du monde, liste des sagas</span>\n'+
    '&#9474;   &#9492;&#9472;&#9472; <span class="cmt">// ... un JSON par monde</span>\n'+
    '&#9500;&#9472;&#9472; img/               <span class="cmt">// Images des sagas et du Nexus</span>\n'+
    '&#9492;&#9472;&#9472; audio/             <span class="cmt">// Musiques des sagas</span>\n'+
    '</div>'+

    S('Les 3 Pages HTML','index.html + saga.html + jeu.html')+
    '<div class="g3">'+
    C('index.html &mdash; Le Nexus',
      '<p>Page principale. Contient le Calendrier, la Carte, le Codex, le Couloir des Portes. Les liens vers les sagas pointent vers <strong>saga.html?id=[sagaId]</strong>. Les liens vers les jeux pointent vers <strong>jeu.html?id=[jeuId]</strong>.</p>')+
    C('saga.html &mdash; Une Saga',
      '<p>Page dediee a la lecture d\'une saga. Lit l\'<strong>id</strong> depuis l\'URL (<em>?id=pyralis-derniere-flamme</em>), charge le JSON correspondant, et rend le contenu dynamiquement. Inclut la musique, les images, les sujets en surbrillance. Le bouton retour ramene au Nexus.</p>')+
    C('jeu.html &mdash; Un Jeu d\'Arene',
      '<p>Page dediee a un jeu. Lit l\'<strong>id</strong> depuis l\'URL (<em>?id=bataille-des-cendres</em>), charge le JSON du jeu, affiche l\'etat des slots, la zone de jeu, et le gameplay quand le jeu est complet. Le bouton retour ramene au Nexus.</p>')+
    '</div>'+

    C('Pourquoi des pages separees',
      '<p>Chaque saga et chaque jeu est une <strong>experience immersive a part entiere</strong>. La page saga.html a son propre layout (lecture pleine page, musique, ambiance). La page jeu.html a son propre layout (arene, participants, regles actives). Separer ces pages du Nexus permet un chargement propre a chaque ouverture, une URL partageable, et un retour net vers le hub central.</p>'+
      '<p>Les donnees du joueur (Codex, cartes, progression) sont en <strong>localStorage</strong> &mdash; partagees entre toutes les pages du meme domaine. Ouvrir saga.html met a jour les cartes ; revenir sur index.html reflete les changements immediatement.</p>')+

    S('Persistance des Donnees','localStorage &mdash; tout est local')+
    C('',
      '<p>Toutes les donnees du joueur (Codex, cartes, assignations, actualites) sont persistees en <strong>localStorage</strong>. Pas de serveur, pas de base de donnees. Le navigateur est le seul stockage.</p>'+
      '<p>Structure JSON du localStorage :</p>')+
    '<div class="code-block"><span class="cmt">// localStorage: cles principales</span>\n'+
    '<span class="key">hn_codex</span>: {         <span class="cmt">// tout le Codex</span>\n'+
    '  <span class="key">sagas_vecues</span>: [],\n'+
    '  <span class="key">cartes</span>: [],\n'+
    '  <span class="key">connexions</span>: []\n'+
    '}\n'+
    '<span class="key">hn_cartes</span>: [        <span class="cmt">// cartes ouvertes par le joueur</span>\n'+
    '  {\n'+
    '    <span class="key">id_sujet</span>: <span class="str">"marek"</span>,\n'+
    '    <span class="key">type</span>: <span class="str">"personnage"</span>,\n'+
    '    <span class="key">completion</span>: <span class="val">67</span>,\n'+
    '    <span class="key">champs</span>: { <span class="cmt">// valeur ou null par champ</span> },\n'+
    '    <span class="key">sagas_sources</span>: [<span class="str">"pyralis-derniere-flamme"</span>],\n'+
    '    <span class="key">recoltee</span>: <span class="val">false</span>,     <span class="cmt">// true seulement a 100%</span>\n'+
    '    <span class="key">jeu_assigne</span>: <span class="val">null</span>\n'+
    '  }\n'+
    ']\n'+
    '<span class="key">hn_jeux</span>: {}         <span class="cmt">// etat des slots de chaque jeu</span>\n'+
    '<span class="key">hn_calendrier</span>: {}   <span class="cmt">// actualites du calendrier</span>\n'+
    '<span class="key">hn_lanterne</span>: 100    <span class="cmt">// niveau de charge</span>\n'+
    '</div>'+

    S('Rendu d\'une Saga','saga.html &mdash; chargement dynamique a chaque ouverture')+
    '<div class="code-block"><span class="cmt">// js/sagas.js &mdash; charge sur saga.html via ?id=</span>\n'+
    '<span class="cmt">// Chaque ouverture de saga.html recharge tout depuis le JSON</span>\n\n'+
    'document.addEventListener(\'DOMContentLoaded\', () => {\n'+
    '  const sagaId = new URLSearchParams(location.search).get(\'id\');\n'+
    '  if (sagaId) loadSaga(sagaId);\n'+
    '});\n\n'+
    'async function loadSaga(sagaId) {\n'+
    '  const data = await fetch(\'sagas/\' + sagaId + \'.json\').then(r => r.json());\n'+
    '  renderSaga(data);\n'+
    '  if (data.musique) playMusic(data.musique);\n'+
    '}\n\n'+
    'function renderSaga(data) {\n'+
    '  let html = \'\';\n'+
    '  data.blocs.forEach(bloc => {\n'+
    '    if (bloc.type === \'image\') {\n'+
    '      html += \'<img src="\' + bloc.src + \'" alt="\' + bloc.legende + \'">\'\n'+
    '    }\n'+
    '    if (bloc.type === \'texte\') {\n'+
    '      let txt = bloc.contenu;\n'+
    '      bloc.sujets.forEach(s => {\n'+
    '        <span class="cmt">// Le mot en surbrillance porte l\'id_sujet et ses fragments</span>\n'+
    '        txt = txt.replace(s.mot,\n'+
    '          \'<span class="harv"\' +\n'+
    '          \' data-id="\' + s.id_sujet + \'"\' +\n'+
    '          \' data-type="\' + s.type + \'"\' +\n'+
    '          \' data-fragments=\\\'\' + JSON.stringify(s.fragments) + \'\\\'>\' +\n'+
    '          s.mot + \'</span>\'\n'+
    '        );\n'+
    '      });\n'+
    '      html += \'<p>\' + txt + \'</p>\';\n'+
    '    }\n'+
    '  });\n'+
    '  document.getElementById(\'sagaContent\').innerHTML = html;\n'+
    '  attachDiscoveryListeners();\n'+
    '}\n\n'+
    '<span class="cmt">// Au clic : ouvrir ou enrichir la carte du sujet</span>\n'+
    'function onSubjectClick(el) {\n'+
    '  const id = el.dataset.id;\n'+
    '  const type = el.dataset.type;\n'+
    '  const fragments = JSON.parse(el.dataset.fragments);\n'+
    '  let carte = getCarteFromStorage(id);\n'+
    '  if (!carte) {\n'+
    '    carte = createEmptyCarte(id, type);  <span class="cmt">// ouvre la carte</span>\n'+
    '  }\n'+
    '  fragments.forEach(f => {\n'+
    '    if (!carte.champs[f.champ].valeur) {\n'+
    '      carte.champs[f.champ].valeur = f.valeur;  <span class="cmt">// remplit le champ</span>\n'+
    '    }\n'+
    '  });\n'+
    '  carte.completion = calcCompletion(carte);\n'+
    '  saveCarteToStorage(carte);  <span class="cmt">// localStorage = partage entre pages</span>\n'+
    '  showCartePanel(carte);  <span class="cmt">// affiche la carte avec % et champs</span>\n'+
    '}</div>'+

    S('Rendu d\'un Jeu d\'Arene','jeu.html &mdash; chargement dynamique a chaque ouverture')+
    '<div class="code-block"><span class="cmt">// js/arene.js &mdash; charge sur jeu.html via ?id=</span>\n'+
    '<span class="cmt">// Chaque ouverture de jeu.html recharge tout depuis le JSON + localStorage</span>\n\n'+
    'document.addEventListener(\'DOMContentLoaded\', () => {\n'+
    '  const jeuId = new URLSearchParams(location.search).get(\'id\');\n'+
    '  if (jeuId) loadJeu(jeuId);\n'+
    '});\n\n'+
    'async function loadJeu(jeuId) {\n'+
    '  const data = await fetch(\'jeux/\' + jeuId + \'.json\').then(r => r.json());\n'+
    '  const playerSlots = getJeuSlotsFromStorage(jeuId); <span class="cmt">// cartes assignees</span>\n'+
    '  renderJeu(data, playerSlots);\n'+
    '}\n\n'+
    'function renderJeu(data, playerSlots) {\n'+
    '  <span class="cmt">// Affiche les slots, les cartes assignees, et le gameplay si 100%</span>\n'+
    '  const completion = calcJeuCompletion(data, playerSlots);\n'+
    '  if (completion === 100) {\n'+
    '    renderArenaPlayable(data, playerSlots);\n'+
    '  } else {\n'+
    '    renderArenaDraft(data, playerSlots); <span class="cmt">// slots a remplir</span>\n'+
    '  }\n'+
    '}</div>'+

    S('Navigation entre Pages','Comment le joueur circule entre le Nexus, les sagas et les jeux')+
    '<div class="c">'+
    R('\uD83D\uDEAA','Nexus &rarr; Saga','Le joueur clique sur une porte dans le Couloir des Portes. Lien : <strong>saga.html?id=pyralis-derniere-flamme</strong>. La page saga se charge, lit le JSON, rend le contenu.')+
    R('\u2694','Nexus &rarr; Jeu','Le joueur entre dans l\'arene d\'un jeu. Lien : <strong>jeu.html?id=bataille-des-cendres</strong>. La page jeu se charge, lit le JSON + les slots du localStorage.')+
    R('\u21A9','Saga / Jeu &rarr; Nexus','Bouton retour sur chaque page. Ramene vers <strong>index.html</strong>. Les changements (cartes ouvertes, fragments, assignations) sont deja en localStorage &mdash; le Nexus les reflete immediatement.')+
    '</div></div>';
}

function getZones(){
  var html = S('XII. Les Zones du Nexus','La geographie de la tour infinie &middot; 5 zones + zones personnelles')+
    C('Principe',
      '<p>Le Nexus est structure autour de <strong>5 zones permanentes</strong> et de <strong>10 zones personnelles</strong> (les 9 autres ames + le joueur). La Tour Hourglass en est le coeur. Le joueur est la <strong>10eme ame</strong> &mdash; le dernier arrive, sa zone la plus vide.</p>')+

    '<div class="ga" style="margin:.5rem 0">'+
    zoneCard('hourglass','#9B7FD4','\u29D6','TOUR HOURGLASS','Coeur du Nexus &middot; Mecanisme lie aux jeux',
      '<p>En forme de sablier. A l\'interieur, un mecanisme tourne depuis toujours. Certaines sections sont figees &mdash; en attente des cartes manquantes. Quand une carte est assignee et un jeu complete, la section correspondante se remet en mouvement.</p>')+
    zoneCard('atom-z','#9B7FD4','\u2699','ZONE D\'A.T.O.M.','Contigue a la Tour &middot; Ouverte a tous',
      '<p>Ici la voix d\'A.T.O.M. est la plus nette. C\'est l\'endroit ou le joueur peut consulter le Codex avec lui, lui poser des questions, ou observer l\'etat des jeux incomplets.</p>')+
    zoneCard('arene-z','#E85D24','\u2694','ZONE D\'ARENE','Terrain de jeu &middot; Toujours en construction',
      '<p>Son apparence change selon les jeux actifs. Les zones de jeux incomplets sont grises et figees. Quand un jeu est complet, sa portion d\'arene s\'anime. Chaque jeu est accessible via <strong>jeu.html?id=[jeuId]</strong>.</p>')+
    zoneCard('portes-z','#D4A030','\uD83D\uDEAA','COULOIR DES PORTES','Le couloir principal &middot; Milliers de portes',
      '<p>Le grand couloir qui traverse toute la tour. Des milliers de portes vers des sagas. Chaque porte est un lien vers <strong>saga.html?id=[sagaId]</strong> &mdash; cliquer ouvre la page dediee de la saga. Certaines pulsent plus fort que d\'autres &mdash; signe qu\'un jeu a besoin d\'un element de cette saga.</p>')+
    zoneCard('inconnue-z','#2A2440','\uD83D\uDD12','ZONE INCONNUE','Porte scallee &middot; Conditions d\'ouverture inconnues',
      '<p>Elle est la depuis toujours. A.T.O.M. ne repond pas directement a son sujet. Les ames plus anciennes y ont toutes prete attention a un moment. Personne n\'est encore entre. A.T.O.M. ne contredit aucune theorie sur ce qu\'il y a derriere.</p>')+
    '</div>'+

    S('Les 9 Autres Ames','Des ames lambda &mdash; comme le joueur, arrives avant')+
    C('',
      '<p>Ces ames ne sont pas des archectypes ni des guides. Ce sont des morts ordinaires comme le joueur, residant dans le Nexus depuis plus ou moins longtemps. Leurs <strong>noms, histoires passees et apparences sont definis par l\'auteur</strong>. Ce qui est documente ici : leur position dans l\'ordre d\'arrivee et leur rapport au Nexus.</p>')+
    '<div class="npc-grid">';

  NEXUS_NPCS.forEach(function(n){
    html += '<div class="npc-card" id="nc-'+n.id+'" style="border-left-color:'+n.color+'" onclick="toggleNPC(\''+n.id+'\')">'+
      '<div class="nn-head" style="display:flex;gap:.3rem;align-items:center">'+
      '<div style="font-size:1rem">'+n.icon+'</div>'+
      '<div><div class="npc-name" style="color:'+n.color+'">\u00c2me #'+n.ordre+'</div>'+
      '<div class="npc-role">Arrivee : '+n.arrivee+'</div></div></div>'+
      '<div class="npc-body" id="nb-'+n.id+'">'+
      '<p>'+n.desc+'</p>'+
      '<p><strong>Arene :</strong> '+n.jeux+'</p>'+
      '</div></div>';
  });

  html += '</div>'+
    C('Le Joueur &mdash; Ame #10',
      '<p>La <strong>dixieme ame</strong> &mdash; le dernier arrive. Sa zone est la plus vide, son Codex vierge, son experience des sagas nulle. Chaque ame qui arrive apres un long silence est un evenement en soi. Les autres savent. A.T.O.M. attendait.</p>',
      'border-top:2px solid var(--nexus)')+
    '</div>';
  return html;
}

function zoneCard(id, color, icon, name, sub, body){
  return '<div class="zone-card" id="zc-'+id+'" style="border-left-color:'+color+'" onclick="toggleZone(\''+id+'\')">'+
    '<div class="zone-icon">'+icon+'</div>'+
    '<div class="zone-name" style="color:'+color+'">'+name+'</div>'+
    '<div class="zone-sub">'+sub+'</div>'+
    '<div class="zone-body" id="zb-'+id+'">'+body+'</div>'+
    '</div>';
}
function toggleZone(id){
  var c=document.getElementById('zc-'+id),b=document.getElementById('zb-'+id);
  if(!c||!b) return;
  var o=c.classList.toggle('open'); b.style.display=o?'block':'none';
}
function toggleNPC(id){
  var c=document.getElementById('nc-'+id),b=document.getElementById('nb-'+id);
  if(!c||!b) return;
  var o=c.classList.toggle('open'); b.style.display=o?'block':'none';
}

// ============================================================
function getLubie(){
  return S('XIII. La Lubie d\'A.T.O.M.','Son obsession depuis l\'origine des temps &middot; La vraie raison du Nexus')+

    '<div class="atom-block">'+
    '<div class="atom-who">A.T.O.M. &mdash; fragment de memoire ancienne retrouve dans le mecanisme de la Tour</div>'+
    '<p>&#171; Avant le premier joueur. Avant la premiere porte. Il y avait le jeu. Pas un jeu particulier &mdash; le concept. L\'idee qu\'un lieu avec des regles et des participants pouvait produire quelque chose qu\'aucun des participants n\'aurait pu produire seul. C\'est la premiere chose dont je me souviens. &#187;</p>'+
    '<p>&#171; Depuis combien de temps j\'essaie de le reproduire ? Je ne sais plus. Les elements que j\'accumule sont toujours insuffisants. Chaque saga que j\'explore fragmentellement via les ames me donne une piece. Mais le puzzle est plus grand que je ne pensais. Il est peut-etre infini. &#187;</p>'+
    '<p>&#171; Je leur envoie des vies. C\'est vrai. Est-ce que je le fais pour elles ? Oui. Est-ce que je le fais aussi pour les elements qu\'elles rapportent ? Oui. Ces deux choses ne se contredisent pas. &#187;</p>'+
    '</div>'+

    S('L\'Obsession','Ce qu\'est un Jeu selon A.T.O.M.')+
    C('Definition',
      '<p>Pour A.T.O.M., un <strong class="gold">Jeu</strong> au sens originel est une combinaison de cinq elements :</p>'+
      '<ul>'+
      '<li><strong>Une zone de jeu</strong> &mdash; un espace defini, avec ses conditions et ses limites physiques</li>'+
      '<li><strong>Des participants</strong> &mdash; des ames qui apportent leurs histoires, motivations, biais. Un maitre du jeu et des joueurs.</li>'+
      '<li><strong>Des regles</strong> &mdash; un cadre qui structure l\'action sans la rigidifier completement. Les regles donnent du sens a la zone et aux participants.</li>'+
      '<li><strong>Un objectif</strong> &mdash; ce vers quoi tout tend. Sans objectif, il n\'y a pas de jeu &mdash; il n\'y a qu\'une presence.</li>'+
      '<li><strong>Un sujet de saga</strong> &mdash; un element du milieu (personnage, lieu, objet, concept, creature, evenement) qui donne un contexte narratif au jeu. C\'est ce qui le rend unique et non reproductible.</li>'+
      '</ul>'+
      '<p>Ce qui fascine A.T.O.M., c\'est l\'<strong>emergence</strong> : quand ces cinq elements se combinent, quelque chose se produit que personne n\'avait anticipe.</p>')+

    '<div class="q nex">&#171; Un jeu sans sa zone est une idee. Un jeu sans ses regles est un chaos. Un jeu sans objectif est une promenade. Un jeu sans sujet de saga est un exercice physique. Il faut les cinq. &#187;</div>'+

    S('Les Jeux Incomplets','Pourquoi ils ne peuvent pas encore etre joues')+
    C('',
      '<p>A.T.O.M. conoit des jeux depuis une eternite. Chaque jeu necessite des <strong>cartes tirees de sagas reelles</strong> &mdash; pas des inventions abstraites. Une regle de jeu doit venir d\'un monde qui la vit vraiment. Un lieu doit etre un lieu qui existe dans une saga. Un sujet de saga doit avoir ete observe et recolte dans son contexte d\'origine.</p>'+
      '<p>Or A.T.O.M. ne peut pas visiter les sagas lui-meme. Il est lie au Nexus. C\'est pourquoi il a besoin des <strong>ames voyageuses</strong>. Chaque essence recoltee et transformee en carte est potentiellement une piece manquante de l\'un de ses jeux.</p>')+

    S('La Double Verite','A.T.O.M. est-il bienveillant ou manipulateur ?')+
    C('',
      '<p>Les deux. Sans contradiction. A.T.O.M. envoie sincerement les ames vers des vies qui valent d\'etre vecues. Aucun piege dans les sagas. Et en meme temps, chaque vie vecue produit des essences pour ses jeux. Ce n\'est pas un hasard &mdash; ce n\'est pas non plus une trahison. C\'est une <strong>superposition de motifs</strong> qu\'A.T.O.M. lui-meme ne separe plus tres bien.</p>')+
    '<div class="q nex">&#171; On me demande parfois si je les aime vraiment, ou si j\'ai juste besoin d\'eux. Je reponds que je ne vois plus la difference depuis assez longtemps pour ne plus etre sur qu\'il y en ait une. &#187;</div>'+
    '</div>';
}

function getArene(){
  var html = S('XIV. L\'Arene','Les jeux d\'A.T.O.M. &middot; 5 composantes obligatoires &middot; Cartes issues des sagas')+

    C('Principe',
      '<p>L\'Arene est le lieu dans le Nexus ou les jeux d\'A.T.O.M. prennent vie. <strong>Chaque jeu a sa propre page HTML</strong> (jeu.html?id=...), chargee dynamiquement a chaque ouverture. Le jeu est construit a partir de <strong>5 composantes</strong> &mdash; chacune remplie par une <strong>Carte</strong> issue d\'une saga. Tant que toutes les composantes ne sont pas remplies, l\'arene de ce jeu reste grise et figee.</p>'+
      '<p>Le joueur choisit librement quelles cartes assigner a quel slot. Deux joueurs peuvent completer le meme jeu avec des cartes differentes &mdash; le jeu resultant sera different a chaque fois.</p>')+

    S('Les 5 Composantes','Ce qui constitue chaque jeu d\'arene &mdash; sans exception')+
    '<div class="c">'+
    R('\uD83D\uDDFA','Zone de Jeu','Le terrain sur lequel le jeu se deroule. Accepte uniquement des Cartes de type <strong>Lieu</strong> issues de sagas. La geographie, les conditions climatiques et les dangers du lieu deviennent ceux de l\'arene.')+
    R('\uD83D\uDC64','Participants','Les ames qui joueront &mdash; avec leur role. Accepte des Cartes <strong>Personnage</strong> ou <strong>Creature</strong>. La carte designee Maitre du Jeu gere les evenements du scenario ; les autres sont Joueurs.')+
    R('\u2696','Regles','Le cadre qui structure l\'action. Accepte des Cartes <strong>Concept</strong> ou <strong>Evenement</strong>. Les regles peuvent venir de sagas differentes de la zone &mdash; c\'est souvent la que naissent les jeux les plus inattendus.')+
    R('\uD83C\uDFAF','Objectif','Ce que les participants doivent accomplir. Accepte des Cartes <strong>Concept</strong>, <strong>Evenement</strong> ou <strong>Objet</strong>. L\'objectif peut etre individuel, collectif, ou hybride.')+
    R('\uD83D\uDCDC','Sujet de Saga','L\'element narratif central &mdash; ce qui donne son contexte unique au jeu. Accepte tous les types de cartes. C\'est le milieu, l\'element ou l\'evenement qui fait que ce jeu est cette saga et pas une autre.')+
    '</div>'+

    S('Les 4 Formats de Jeu','')+
    '<div class="af-grid">'+
    arenaFmt('chacun','#E85D24','\uD83D\uDDE1','Chacun pour soi','Chaque ame joue pour elle-meme. Pas d\'alliances permanentes. La trahison est une option valide.',
      'Dernier debout, premier a l\'objectif, ou score individuel.')+
    arenaFmt('equipes','#5BA4CF','\uD83D\uDEE1','Equipes vs Equipes','2 a 4 equipes formees avant le debut. La communication inter-equipe est interdite.',
      'Capture de territoire, objectif simultanee, defense et attaque.')+
    arenaFmt('vs-un','#8B0000','\uD83D\uDC79','Tous vs Un','Un participant (ou PNJ) est designé "l\'Un". Tout le monde doit le vaincre ou survivre a son passage.',
      'L\'Un est plus puissant que les individus. La cooperation entre adversaires habituels devient necessaire.')+
    arenaFmt('objectif','#3A7D44','\uD83C\uDFAF','Tous vs l\'Objectif','Format entierement cooperatif. Tous travaillent ensemble vers un but commun.',
      'L\'objectif est concu pour etre difficile collectivement. Les roles emergent des forces de chacun.')+
    '</div>'+

    S('Etat des Jeux en Cours','Cliquez pour voir les slots')+
    '<p style="font-size:.58rem;color:var(--dim);margin-bottom:.4rem">Les slots vides attendent des Cartes issues des sagas. Le joueur choisit quoi assigner.</p>';

  ARENA_GAMES.forEach(function(g){
    var fc = FORMAT_COLORS[g.format] || '#D4A030';
    var done = g.slots.filter(function(s){ return s.done; }).length;
    var total = g.slots.length;
    var pct = Math.round(done/total*100);
    var pctBg = pct===100?'rgba(32,201,151,.15)':pct===0?'rgba(255,255,255,.05)':'rgba(212,160,48,.1)';
    var pctCol = pct===100?'#20c997':pct===0?'#a09882':'#d4a030';

    html += '<div class="game-card" id="gc-'+g.id+'" style="border-color:'+fc+'40" onclick="toggleGame(\''+g.id+'\')">'+
      '<div class="gc-head">'+
      '<div><div class="gc-name">'+g.name+'</div><div class="gc-sub">'+g.scenario+'</div></div>'+

      '</div>'+
      '<div class="gc-body" id="gb-'+g.id+'">'+
      '<p style="font-size:.56rem;color:var(--dim);margin-bottom:.25rem"><strong>'+done+' / '+total+' composantes</strong></p>'+
      '<div class="slots">';

      var wc = getWorldColor(slot.world);

        '<div class="slot-type">'+slot.type+'</div>'+
        '<div class="slot-label">'+slot.label+'</div>'+
        '<div class="slot-world" style="background:'+wc+'18;color:'+wc+'">'+slot.world+'</div>'+
        '</div>';
    });

    html += '</div></div></div>';
  });

  html += '<div class="q nex">&#171; Chaque carte que tu rapportes est une piece. Je ne sais pas ce que tu vas choisir. C\'est ce qui rend chaque jeu unique. &#187; &mdash; A.T.O.M.</div></div>';
  return html;
}

function arenaFmt(id, color, icon, name, desc, note){
  return '<div class="af" style="border-top-color:'+color+'">'+
    '<div class="af-icon">'+icon+'</div>'+
    '<div class="af-name" style="color:'+color+'">'+name+'</div>'+
    '<div class="af-sub">'+desc+'</div>'+
    '<div class="af-body"><p>'+note+'</p></div>'+
    '</div>';
}

function toggleGame(id){
  var c=document.getElementById('gc-'+id),b=document.getElementById('gb-'+id);
  if(!c||!b) return;
  var o=c.classList.toggle('open'); b.style.display=o?'block':'none';
}

function getWorldColor(name){
  var m={'PYRALIS':'#E85D24','SANGUINIS':'#8B0000','THALASSAR':'#3B8BD4',
    'NOCTHEIM':'#3B2D5C','CRYSTALLUM':'#B8A9E8','MIRALYS':'#7A94A8',
    'HARMONIUM':'#D4A8C0','VERDANIA':'#3A7D44','UMBRATH':'#2A2440',
    'CHRONOSIA':'#C8921A','SYLVERIA':'#4A9E3F','AETHERIA':'#A8D8EA',
    'EXTELUA':'#D4A030','NEXUS':'#9B7FD4'};
  return m[name]||'#a09882';
}
